name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-checks:
    name: Format, analyze, test, and build web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: stable
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Restore dependencies
        run: flutter pub get

      - name: Check formatting for changed Dart files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            mapfile -t dart_files < <(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}"...HEAD -- '*.dart')
          else
            mapfile -t dart_files < <(git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" "${{ github.sha }}" -- '*.dart')
          fi

          if (( ${#dart_files[@]} == 0 )); then
            echo "No changed Dart files to format."
            exit 0
          fi

          if ! dart format --output=none --set-exit-if-changed "${dart_files[@]}"; then
            dart format "${dart_files[@]}"
            git diff -- "${dart_files[@]}"
            exit 1
          fi

      - name: Run static analysis
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build Flutter web
        run: flutter build web --release --no-pub
